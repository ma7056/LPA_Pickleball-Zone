<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>匹克球團管理系統 - Pro 版</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* 整合 include_css.html 的精華 */
        :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { background-color: #f4f7f6; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; padding-bottom: 80px; }
        
        /* 門戶頁面樣式 */
        .portal-header { background: var(--primary-gradient); color: white; padding: 40px 20px; border-radius: 0 0 30px 30px; text-align: center; margin-bottom: 20px; }
        .feature-card { border: none; border-radius: 20px; transition: transform 0.2s; cursor: pointer; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .feature-card:active { transform: scale(0.95); }
        .icon-box { width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 24px; }

        /* 整合 module_user_center.html 樣式 */
        .honor-marquee { background: #fff3cd; color: #856404; overflow: hidden; white-space: nowrap; padding: 8px 0; font-size: 0.85rem; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ffeeba; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; font-weight: bold; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .rank-progress-container { background: #e9ecef; border-radius: 10px; height: 12px; position: relative; margin: 10px 0; }
        .rank-progress-bar { background: linear-gradient(90deg, #ffce67 0%, #ffab00 100%); height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }
        .rank-marker { position: absolute; top: -25px; transform: translateX(-50%); font-size: 0.7rem; font-weight: bold; background: #333; color: #fff; padding: 2px 6px; border-radius: 4px; transition: left 1s ease-in-out; }
        
        /* 管理端樣式 */
        .checkin-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .stepper { display: flex; align-items: center; background: #f8f9fa; border-radius: 8px; padding: 2px; }
        .stepper button { border: none; background: none; width: 30px; font-weight: bold; }
        .stepper input { width: 40px; text-align: center; border: none; background: transparent; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="portal-ui" class="app-container">
        <div class="portal-header shadow">
            <h2 class="fw-bold mb-1">匹克球預約系統</h2>
            <p class="opacity-75 small">Smart Badminton Management</p>
        </div>
        
        <div class="container px-4">
            <div class="row g-3">
                <div class="col-6" onclick="switchUI('booking-ui', 'portal-ui'); fetchData();">
                    <div class="feature-card p-4 text-center">
                        <div class="icon-box bg-primary text-white"><i class="bi bi-calendar-check"></i></div>
                        <h6 class="fw-bold mb-0">我要預約</h6>
                    </div>
                </div>
                <div class="col-6" onclick="popMemberCenter()">
                    <div class="feature-card p-4 text-center">
                        <div class="icon-box bg-success text-white"><i class="bi bi-person-badge"></i></div>
                        <h6 class="fw-bold mb-0">會員中心</h6>
                    </div>
                </div>
                <div class="col-12" onclick="popAdminLogin()">
                    <div class="feature-card p-4 d-flex align-items-center">
                        <div class="icon-box bg-dark text-white mb-0 me-3"><i class="bi bi-shield-lock"></i></div>
                        <div class="text-start">
                            <h6 class="fw-bold mb-1">管理員登入</h6>
                            <p class="text-muted small mb-0">場次、點數與簽到管理</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="booking-ui" class="app-container" style="display:none;">
        <div class="p-3 d-flex justify-content-between align-items-center bg-white border-bottom sticky-top shadow-sm">
            <h6 class="fw-bold m-0"><i class="bi bi-calendar3 me-2"></i>選擇活動場次</h6>
            <button class="btn btn-sm btn-outline-secondary" onclick="exitToPortal('booking-ui')">返回</button>
        </div>
        <div id="calendar-container" class="p-3">
            <div class="d-flex justify-content-between align-items-center mb-3 bg-light p-2 rounded-pill">
                <button class="btn btn-sm btn-dark rounded-circle" onclick="changeMonth(-1)">❮</button>
                <div id="month-display" class="fw-bold">2026 年 1 月</div>
                <button class="btn btn-sm btn-dark rounded-circle" onclick="changeMonth(1)">❯</button>
            </div>
            <div id="calendar-grid"></div>
        </div>
    </div>

    <div id="user-center-ui" class="app-container" style="display:none;">
        <div class="p-3 d-flex justify-content-between align-items-center bg-white border-bottom sticky-top shadow-sm">
            <h6 class="fw-bold m-0 text-success">👤 會員個人中心</h6>
            <button class="btn btn-sm btn-outline-secondary" onclick="exitToPortal('user-center-ui')">返回</button>
        </div>
        <div class="p-3">
            <div id="uc-wallet-card" class="mb-3 shadow-lg" style="background: linear-gradient(135deg, #1d976c 0%, #20c997 100%); border-radius: 28px; color: white; min-height: 180px; position: relative; overflow: hidden; padding: 25px;">
                <div id="uc-name" style="font-size: 1.6rem; font-weight: 900;">---</div>
                <div id="uc-id" style="font-size: 0.85rem; opacity: 0.8;">ID: ---</div>
                <div style="margin-top: 20px;">
                    <span style="font-size: 0.7rem; opacity: 0.9;">可用餘額</span>
                    <div style="font-size: 3rem; font-weight: 900; line-height: 1;"><span id="uc-balance">0</span><small style="font-size: 0.9rem;">PTS</small></div>
                </div>
                <div onclick="zoomQRCode()" style="position:absolute; top:25px; right:25px; background:white; padding:8px; border-radius:15px; text-align:center;">
                    <img id="uc-qr-small" src="" style="width: 70px; height: 70px;">
                    <div style="color:#1d976c; font-size:9px; font-weight:900;">簽到碼</div>
                </div>
            </div>
            <div class="honor-marquee"><div class="marquee-content" id="rank-marquee-text">同步數據中...</div></div>
            <div id="tab-content-appointments">
                 <div id="uc-appointments"></div>
            </div>
        </div>
    </div>

    <div id="admin-ui" class="app-container" style="display:none;">
        <div class="p-3 d-flex justify-content-between align-items-center bg-white border-bottom sticky-top">
            <h6 id="admin-header-title" class="fw-bold m-0">簽到中心</h6>
            <button class="btn btn-sm btn-outline-secondary" onclick="exitToPortal('admin-ui')">退出</button>
        </div>
        <div id="admin-date-nav" class="d-flex overflow-auto p-2 bg-light border-bottom"></div>
        <div id="admin-content" class="p-2"></div>
        <div id="deposit-box" class="p-3 bg-white border-top fixed-bottom mx-auto" style="max-width:500px; display:none;">
            <div class="input-group">
                <input type="number" id="depId" class="form-control" placeholder="ID 末3碼">
                <input type="number" id="depAmt" class="form-control" placeholder="金額">
                <button class="btn btn-primary" onclick="doDeposit()">儲值</button>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * 核心：GitHub Pages API 橋接器
 * 替換 google.script.run 為 Fetch 調用
 */
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxQLHff94DAIUK4yzm0faWy_1uyI9xQLZFql6pBFK3LcNm46JBvaSgUNyXpkwtdtlnTHA/exec"; // <--- 重點！

const google = {
    script: {
        run: {
            withSuccessHandler: function(callback) {
                this.callback = callback;
                return this;
            },
            // 動態代理所有函數名
            _invoke: async function(functionName, args) {
                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ functionName, args })
                    });
                    const result = await response.json();
                    if (this.callback) this.callback(result);
                } catch (err) {
                    Swal.fire('系統錯誤', '無法連線至後端服務', 'error');
                }
            },
            // 下面手動對應您有使用的後端函數
            fetchInitialData: function() { this._invoke('fetchInitialData', []); },
            getCheckInList: function(date) { this._invoke('getCheckInList', [date]); },
            submitCheckIn: function(d, n, p, nt, isN) { this._invoke('submitCheckIn', [d, n, p, nt, isN]); },
            handleBooking: function(d, n) { this._invoke('handleBooking', [d, n]); },
            checkAdmin: function(id, pw) { this._invoke('checkAdmin', [id, pw]); },
            getMemberProfile: function(id, pw) { this._invoke('getMemberProfile', [id, pw]); },
            adminDeposit: function(id, amt, role) { this._invoke('adminDeposit', [id, amt, role]); }
            // ...以此類推，補上其他函數名
        }
    }
};

// --- 全域變數 ---
let userRole = 'GUEST';
let currentAdminDate = '';
let tempNotes = {};

// --- 介面切換 ---
function switchUI(showId, hideId) {
    document.getElementById(hideId).style.display = 'none';
    document.getElementById(showId).style.display = 'block';
    window.scrollTo(0,0);
}

function exitToPortal(currentId) {
    switchUI('portal-ui', currentId);
}

// --- 登入邏輯 (管理端) ---
function popAdminLogin() {
    Swal.fire({
        title: '管理員認證',
        html: `
            <input type="number" id="admId" class="swal2-input" placeholder="帳號 (末3碼)">
            <input type="password" id="admPw" class="swal2-input" placeholder="密碼">
        `,
        preConfirm: () => ({ id: document.getElementById('admId').value, pw: document.getElementById('admPw').value })
    }).then(r => {
        if(r.isConfirmed) {
            Swal.fire({ title: '驗證中...', didOpen: () => Swal.showLoading() });
            google.script.run.withSuccessHandler(res => {
                if(res.success) {
                    userRole = res.role;
                    document.getElementById('deposit-box').style.display = (userRole === 'ADMIN' ? 'block' : 'none');
                    document.getElementById('admin-header-title').innerText = `簽到中心 (${userRole==='ADMIN'?'總管':'工讀'})`;
                    currentAdminDate = new Date().toLocaleDateString('en-CA');
                    switchUI('admin-ui', 'portal-ui');
                    renderAdminDateNav();
                    loadAdminContent();
                    Swal.close();
                } else {
                    Swal.fire('錯誤', res.msg, 'error');
                }
            }).checkAdmin(r.value.id, r.value.pw);
        }
    });
}

// --- 會員中心登入 ---
function popMemberCenter() {
    Swal.fire({
        title: '會員登入',
        html: `
            <input type="number" id="mId" class="swal2-input" placeholder="編號末3碼">
            <input type="password" id="mPw" class="swal2-input" placeholder="密碼">
        `,
        preConfirm: () => ({ id: document.getElementById('mId').value, pw: document.getElementById('mPw').value })
    }).then(r => {
        if(r.isConfirmed) {
            google.script.run.withSuccessHandler(res => {
                if(res.success) {
                    document.getElementById('uc-name').innerText = res.data.name;
                    document.getElementById('uc-balance').innerText = res.data.balance;
                    document.getElementById('uc-id').innerText = "ID: " + res.data.id;
                    document.getElementById('uc-qr-small').src = `https://quickchart.io/qr?size=150&text=${res.data.id}`;
                    switchUI('user-center-ui', 'portal-ui');
                } else {
                    Swal.fire('錯誤', res.msg, 'error');
                }
            }).getMemberProfile(r.value.id, r.value.pw);
        }
    });
}

// --- 簽到清單渲染 ---
function loadAdminContent() {
    google.script.run.withSuccessHandler(res => {
        const container = document.getElementById('admin-content');
        if(!res.success) { container.innerHTML = '<p class="text-center p-4">本日無活動</p>'; return; }
        
        let html = "";
        res.main.forEach(p => {
            const isS = res.signed.includes(p.name);
            html += `
            <div class="checkin-item">
                <div class="member-info">
                    <div class="fw-bold">${p.id.toString().slice(-3)} ${p.name}</div>
                    <div class="small text-muted">(餘:${p.balance})</div>
                </div>
                <div class="d-flex align-items-center">
                    <div class="stepper me-2">
                        <button onclick="changeStep('${p.name}',-1)">-</button>
                        <input type="number" id="pts_${p.name}" value="1" readonly>
                        <button onclick="changeStep('${p.name}',1)">+</button>
                    </div>
                    <button class="btn btn-sm ${isS?'btn-success':'btn-primary'}" ${isS?'disabled':''} onclick="doSign(this,'${p.name}')">
                        ${isS?'已簽':'簽到'}
                    </button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }).getCheckInList(currentAdminDate);
}

function changeStep(n, d) {
    let e = document.getElementById('pts_'+n);
    let v = parseInt(e.value)+d;
    e.value = v < 1 ? 1 : v;
}

function doSign(btn, name) {
    const p = document.getElementById('pts_'+name).value;
    btn.disabled = true;
    google.script.run.withSuccessHandler(res => {
        if(res.success) loadAdminContent();
        else { Swal.fire('錯誤', res.msg, 'error'); btn.disabled = false; }
    }).submitCheckIn(currentAdminDate, name, p, "", false);
}

// --- 初始化導覽 ---
function renderAdminDateNav() {
    const nav = document.getElementById('admin-date-nav');
    nav.innerHTML = '';
    for(let i=-2; i<=2; i++) {
        let d = new Date(); d.setDate(d.getDate()+i);
        let dS = d.toLocaleDateString('en-CA');
        let div = document.createElement('div');
        div.className = `p-2 me-2 rounded ${dS === currentAdminDate ? 'bg-primary text-white' : 'bg-white'}`;
        div.style.minWidth = "60px";
        div.style.textAlign = "center";
        div.innerHTML = `<small>${d.getMonth()+1}/${d.getDate()}</small>`;
        div.onclick = () => { currentAdminDate = dS; renderAdminDateNav(); loadAdminContent(); };
        nav.appendChild(div);
    }
}
</script>

</body>
</html>
